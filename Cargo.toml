[workspace]
resolver = "2"
members = [
    "crates/sinfonia",
    "crates/sinfonia-bridge",
    "crates/sinfonia-tracker",
]

[workspace.package]
version = "0.3.0-alpha.3"
edition = "2021"
rust-version = "1.88"
license = "Apache-2.0"
authors = ["The Sinfonia Contributors"]
homepage = "https://github.com/O-Side-Systems/sinfonia"
repository = "https://github.com/O-Side-Systems/sinfonia"
documentation = "https://docs.rs/sinfonia"

[workspace.dependencies]
# Cross-crate Sinfonia members.
sinfonia-tracker = { path = "crates/sinfonia-tracker", version = "0.3.0-alpha.3" }

# Async runtime + HTTP + serialization shared across crates.
tokio = { version = "1.41", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
clap = { version = "4.5", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
axum = { version = "0.7", features = ["macros"] }
tower = "0.5"
liquid = "0.26"
notify = "6"
anyhow = "1"
thiserror = "1"
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
futures = "0.3"
regex = "1"
dirs = "5"
shellexpand = "3"
uuid = { version = "1", features = ["v4"] }
parking_lot = "0.12"
url = "2"
once_cell = "1"
which = "8"

# Interactive REPL for `sinfonia init` (Phase 5 Â§3.2). `inquire` over
# `dialoguer` per plan-doc Â§7 open question 1: cleaner sync API, smaller
# transitive surface (no `console` dep). Validators are sync; no async needed.
inquire = "0.7"

# Observability (Phase 3). Both Sinfonia and the bridge layer an OTel exporter
# over the existing `tracing` subscribers â€” see plan doc Â§2 + Â§10. Versions
# verified against crates.io at impl time: `tracing-opentelemetry 0.33` pins
# `opentelemetry ^0.32`, so the four crates ship as one set (0.32 across
# opentelemetry/_sdk/-otlp + 0.33 for the tracing bridge). Plan-doc version
# numbers (0.24/0.17/0.25) were ~8 minors stale by 2026-05; the feature flag
# names (`grpc-tonic`, `http-proto`, `rt-tokio`) held up.
opentelemetry = "0.32"
opentelemetry_sdk = { version = "0.32", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.32", features = ["grpc-tonic", "http-proto"] }
# `semconv_experimental` gates the stable-in-spec but
# experimental-in-this-crate constants like `SERVICE_NAMESPACE` and
# `SERVICE_INSTANCE_ID` (used for the routing-processor split per plan Â§3.3).
# The crate's "stable" subset is the bare minimum (essentially just
# `SERVICE_NAME`); the feature flag is a versioning hedge, not a spec
# stability claim.
opentelemetry-semantic-conventions = { version = "0.32", features = ["semconv_experimental"] }
tracing-opentelemetry = "0.33"

# Precision-safe decimals for money (USD cost values). Per STATUS Â§5.1 cost
# values are written as `CustomFieldValue::String` for precision; the bridge's
# in-process accumulator uses `rust_decimal` so the stringification step is the
# only floating-point boundary.
rust_decimal = { version = "1", features = ["serde"] }

# HMAC-SHA256 â€” shared between the GitHub webhook verifier (P1-E) and the
# Phase 3 typed Sinfoniaâ†”bridge event channel (Â§7.2). Already a transitive
# dep of `sinfonia-bridge`; promoted to workspace scope so the new Sinfonia
# emitter can sign with the same algorithm without a separate dep version.
hmac = "0.12"
sha2 = "0.10"

# Dev-only.
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
