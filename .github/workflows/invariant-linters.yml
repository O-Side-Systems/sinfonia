name: invariant-linters

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - "scripts/lint-stale-nodes.sh"
      - ".github/workflows/invariant-linters.yml"
  push:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"

permissions:
  contents: read
  pull-requests: read

# NOTE (CR-03): the overlap linter lives in its own workflow
# (.github/workflows/overlap-linter.yml) with NO paths filter, because it
# inspects OTHER open PRs (not the current diff) and must run on every PR.
# A paths filter here would let two overlapping feature PRs that don't touch
# AGENTS.md bypass the overlap gate entirely.
jobs:
  stale-node-linter:
    name: stale-node linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # REQUIRED: git merge-base needs full history for stale detection
      - name: lint-stale-nodes
        run: |
          chmod +x scripts/lint-stale-nodes.sh
          scripts/lint-stale-nodes.sh
