# .github/workflows/docker-publish.yml — Phase 6 publish pipeline.
#
# Triggers:
#   - push of a `v*` tag (the release path) → build all six targets and push
#     to ghcr.io/o-side-systems/<name>:{VERSION,VERSION_MINOR,latest}.
#   - manual dispatch with a `version` input → same, but the operator picks
#     the version string (used to re-publish or to push a `dev` tag).
#
# The bake file (`docker-bake.hcl`) is the single source of truth for which
# targets exist and which tags each one gets. This workflow is the runner.

name: Publish Docker images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (no leading v). Defaults to the workflow run id."
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  security-events: write   # Trivy SARIF upload

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve VERSION
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # refs/tags/v0.3.0 → 0.3.0
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="dev-${GITHUB_RUN_ID}"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=$v"

      - name: Build and push (all targets)
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: docker buildx bake --push

      - name: Print pushed digests
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          for img in sinfonia sinfonia-bridge sinfonia-with-claude-code \
                    sinfonia-with-codex sinfonia-with-opencode sinfonia-all-agents; do
            echo "--- ghcr.io/o-side-systems/$img:$VERSION ---"
            docker buildx imagetools inspect "ghcr.io/o-side-systems/$img:$VERSION" || true
          done

      - name: Run image smoke tests
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: ./tests/docker-smoke.sh

      - name: Run compose stack smoke test
        env:
          VERSION: ${{ steps.version.outputs.value }}
          # Smoke creds — fake values that satisfy the env-var presence
          # checks but are never used because the smoke compose fixtures
          # point at no real tracker / webhook source.
          LINEAR_API_KEY: smoke-fake
          GH_WEBHOOK_SECRET: smoke-fake
          POSTGRES_PASSWORD: smoke-fake
        run: ./tests/docker-compose-smoke.sh

  scan:
    name: Trivy scan
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - sinfonia
          - sinfonia-bridge
          - sinfonia-with-claude-code
          - sinfonia-with-codex
          - sinfonia-with-opencode
          - sinfonia-all-agents
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve VERSION
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="dev-${GITHUB_RUN_ID}"
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"

      - name: Scan ${{ matrix.image }} for CRITICAL/HIGH CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/o-side-systems/${{ matrix.image }}:${{ steps.version.outputs.value }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
