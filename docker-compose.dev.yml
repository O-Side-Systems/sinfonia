# Shared base used by both services via YAML anchor.
x-base: &base
  image: sinfonia-claude:latest
  build:
    context: .
    dockerfile: Dockerfile.dev
    args:
      USER_UID: "501"
      USER_GID: "20"
  working_dir: /workspace
  env_file:
    - path: .env
      required: false
    # Supabase credentials for the target project (wyrd-builder). Loaded into
    # the container env; the agent subprocess inherits them (env_policy: inherit).
    - path: docker/.env
      required: false
  environment:
    TERM: xterm-256color
    LINEAR_API_KEY: ${LINEAR_API_KEY:-}
    GH_TOKEN: ${GH_TOKEN:-}
    GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    RUST_LOG: ${RUST_LOG:-sinfonia=debug,orchestrator=debug,runner=debug,sinfonia_bridge=debug,webhook=debug,feedback=debug,merge=info,gh=info}
    GIT_USER_NAME: ${GIT_USER_NAME:-}
    GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
    # HMAC secret for the GitHub repo webhook the bridge verifies. Lives in
    # .env (gitignored); must match the secret configured on the repo webhook.
    GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET:-}
    # Lets `claude` run with --dangerously-skip-permissions headlessly. The
    # old working instance set this alongside a Claude Max login; keep it.
    IS_SANDBOX: "1"
  volumes:
    - .:/workspace
    # Claude Code auth: a dedicated named volume holding the agent's
    # ~/.claude (incl. the Max OAuth .credentials.json). On macOS the host
    # login lives in the Keychain and is NOT bind-mountable, so we persist a
    # one-time in-container Max `/login` in this volume instead — matching the
    # previous working setup. Re-login via the `shell` service if it expires.
    - sinfonia-claude:/home/dev/.claude
    - sinfonia-cargo-registry:/home/dev/.cargo/registry
    - sinfonia-cargo-git:/home/dev/.cargo/git
    - sinfonia-target:/workspace/target

services:
  # Long-running sinfonia daemon. Start with `docker compose up -d daemon`.
  daemon:
    <<: *base
    container_name: sinfonia-daemon
    ports:
      - "8080:8080"
    command:
      - sh
      - -c
      - |
        cargo build --release
        exec ./target/release/sinfonia docker/WORKFLOW.md --port 8080 --log-format pretty

  # CI feedback bridge. Reacts to GitHub webhooks and drives Linear state.
  # Start with `docker compose -f docker-compose.dev.yml up -d bridge`.
  # Shares the build target volume with the daemon, so it runs the locally
  # built binary (incl. the required_checks + awaiting_review_state changes),
  # NOT the published 0.4.0-alpha.2 image.
  bridge:
    <<: *base
    container_name: sinfonia-bridge
    ports:
      - "8081:8081"
    command:
      - sh
      - -c
      - |
        cargo build --release
        mkdir -p /home/dev/.sinfonia
        exec ./target/release/sinfonia-bridge docker/BRIDGE.md --port 8081 --log-format pretty

  # Interactive Claude Code session. Use with `docker compose run --rm shell`.
  # Useful for signing in, debugging, or driving manual checks against the repo.
  shell:
    <<: *base
    container_name: sinfonia-shell
    stdin_open: true
    tty: true
    command: ["claude", "--dangerously-skip-permissions"]

volumes:
  sinfonia-cargo-registry:
  sinfonia-cargo-git:
  sinfonia-target:
  # Reuse the existing volume that already holds the Claude Max login
  # (created by the prior standalone instance), not a project-prefixed one.
  sinfonia-claude:
    external: true
