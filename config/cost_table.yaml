# Sinfonia v0.3 — per-provider, per-model pricing in USD per 1M tokens.
#
# This file is `include_str!`'d into the `sinfonia-bridge` binary at compile
# time so the binary always has a default cost table. Operators override
# at runtime via `bridge.cost_table_path` in BRIDGE.md when a provider's
# pricing changes between Sinfonia releases.
#
# Source: provider public pricing pages.
# Last verified: 2026-05-21. The bridge logs a `WARN` if this value is
# more than 90 days stale at startup (plan cross-cutting concern C).
# Per the M-2 plan-checker fix, the bridge ALSO refuses to apply cost
# caps (token caps still apply) when this value is more than 180 days
# stale — see `feedback/cost.rs::CostTable::accepts_cost_caps`.
verified_at: 2026-05-21

providers:
  anthropic:
    claude-haiku-4-5-20251001:
      input_per_million_usd: 1.00
      output_per_million_usd: 5.00
    claude-sonnet-4-6:
      input_per_million_usd: 3.00
      output_per_million_usd: 15.00
    claude-opus-4-7:
      input_per_million_usd: 15.00
      output_per_million_usd: 75.00
  openai:
    gpt-4o:
      input_per_million_usd: 2.50
      output_per_million_usd: 10.00
    gpt-4o-mini:
      input_per_million_usd: 0.15
      output_per_million_usd: 0.60
    gpt-5:
      input_per_million_usd: 5.00
      output_per_million_usd: 20.00
  google:
    gemini-1.5-pro:
      input_per_million_usd: 1.25
      output_per_million_usd: 5.00
    gemini-2.0-flash:
      input_per_million_usd: 0.10
      output_per_million_usd: 0.40
  # Locally-hosted models: zero unit cost (compute is owned). The cost
  # accumulator still records `0` deltas so the dashboards distinguish
  # "ran but cost $0" from "didn't run."
  ollama:
    qwen2.5-coder:32b:
      input_per_million_usd: 0.00
      output_per_million_usd: 0.00
    llama3.1:
      input_per_million_usd: 0.00
      output_per_million_usd: 0.00
